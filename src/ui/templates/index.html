<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --surface:     #18181b;
      --surface2:    #222226;
      --surface3:    #2a2a2f;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.1);
      --text:        #f0f0f2;
      --text2:       #a0a0aa;
      --text3:       #606068;
      --accent:      #e8334a;
      --accent2:     #3a6ff7;
      --accent-glow: rgba(232,51,74,0.15);
      --accent-soft: rgba(232,51,74,0.08);
      --green:       #4ade80;
      --font:        'Sora', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Full-screen chat shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #e8334a, #3a6ff7);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 11px; font-weight: 500;
      color: #fff;
    }

    .model-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 5px var(--green);
    }

    /* ── Messages area ── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* ── Empty / welcome state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      padding: 40px 24px;
      text-align: center;
    }

    .empty-logo {
      width: 52px; height: 52px;
      background: var(--accent-soft);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 17px; font-weight: 500;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 22px; font-weight: 600;
      color: var(--text); letter-spacing: -0.4px;
    }

    .empty-sub {
      font-size: 14px; color: var(--text2);
      line-height: 1.65; max-width: 340px;
    }

    .suggestions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%; max-width: 460px;
      margin-top: 6px;
    }

    .suggestion {
      padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--surface);
      font-size: 12.5px; color: var(--text2);
      cursor: pointer; transition: all 0.15s;
      text-align: left; line-height: 1.45;
      font-family: var(--font);
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }

    /* ── Messages list ── */
    .messages {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 16px;
      display: flex;
      flex-direction: column;
    }

    .msg-row {
      display: flex;
      gap: 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.18s ease both;
    }
    .msg-row:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-avatar.ai   { background: linear-gradient(135deg, #e8334a, #3a6ff7); color: #fff; font-family: var(--mono); }
    .msg-avatar.user { background: var(--surface3); color: var(--text2); font-family: var(--font); font-size: 12px; }

    .msg-content { flex: 1; min-width: 0; }
    .msg-name { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .msg-text { font-size: 14.5px; line-height: 1.75; color: var(--text); white-space: pre-wrap; word-break: break-word; }

    /* Markdown rendered content */
    .msg-text.md { white-space: normal; }
    .msg-text.md p { margin-bottom: 10px; }
    .msg-text.md p:last-child { margin-bottom: 0; }
    .msg-text.md strong { font-weight: 600; color: var(--text); }
    .msg-text.md em { font-style: italic; }
    .msg-text.md h1, .msg-text.md h2, .msg-text.md h3 {
      font-weight: 600; color: var(--text);
      margin: 14px 0 6px; line-height: 1.3;
    }
    .msg-text.md h1 { font-size: 18px; }
    .msg-text.md h2 { font-size: 16px; }
    .msg-text.md h3 { font-size: 15px; }
    .msg-text.md ul, .msg-text.md ol {
      padding-left: 20px; margin-bottom: 10px;
    }
    .msg-text.md li { margin-bottom: 4px; }
    .msg-text.md code {
      font-family: var(--mono); font-size: 13px;
      background: var(--surface3); color: #e0c0ff;
      padding: 2px 6px; border-radius: 4px;
    }
    .msg-text.md pre {
      background: var(--surface3); border-radius: 8px;
      padding: 12px 14px; margin: 10px 0; overflow-x: auto;
    }
    .msg-text.md pre code {
      background: none; padding: 0; color: var(--text2);
    }
    .msg-text.md a { color: var(--accent); text-decoration: none; }
    .msg-text.md a:hover { text-decoration: underline; }
    .msg-text.md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px; color: var(--text2);
      margin: 8px 0;
    }
    .msg-text.md hr { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }

    /* Streaming cursor */
    .cursor {
      display: inline-block; width: 2px; height: 15px;
      background: var(--accent); border-radius: 1px;
      margin-left: 1px; vertical-align: middle;
      animation: blink 0.55s steps(1) infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Profile pills */
    .profiles-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .profile-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 999px;
      border: 1px solid var(--border2); background: var(--surface2);
      font-size: 12px; color: var(--text2);
      animation: fadeUp 0.2s ease both;
    }
    .profile-pill::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent); flex-shrink: 0;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* Expander za profile */
    .profiles-expander {
      margin-top: 16px;
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .expander-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .expander-header:hover {
      background: var(--surface2);
    }

    .expander-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
    }

    .expander-arrow {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
      color: var(--text3);
    }
    .expander-arrow.open {
      transform: rotate(180deg);
    }

    .expander-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .expander-content.open {
      max-height: 600px;
      overflow-y: auto;
    }

    .profile-card {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }
    .profile-card:first-child {
      border-top: none;
    }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .profile-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .profile-score {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .profile-headline {
      font-size: 12.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .profile-summary {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .profile-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.15s;
    }
    .profile-link:hover {
      color: var(--accent);
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
    .typing-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text3); animation: td 1.1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes td { 0%,60%,100%{transform:scale(1);opacity:0.35} 30%{transform:scale(1.4);opacity:1} }

    /* ── Input area ── */
    .input-shell {
      padding: 12px 24px 20px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .input-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      display: block; width: 100%;
      background: transparent; border: none; outline: none; resize: none;
      padding: 15px 52px 15px 18px;
      font-family: var(--font); font-size: 14px;
      color: var(--text); line-height: 1.6;
      min-height: 52px; max-height: 200px;
      overflow-y: auto; scrollbar-width: none;
    }
    textarea::placeholder { color: var(--text3); }
    textarea::-webkit-scrollbar { display: none; }

    .send-btn {
      position: absolute; right: 9px; bottom: 9px;
      width: 34px; height: 34px; border-radius: 9px;
      border: none; background: linear-gradient(135deg, #e8334a, #3a6ff7); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: linear-gradient(135deg, #3a6ff7, #e8334a); }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.25; cursor: default; }

    /* Waiting / streaming state */
    .input-box.waiting {
      border-radius: 14px;
      animation: pulse-border 1.8s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 2px rgba(232,51,74,0.08); }
      50%       { box-shadow: 0 0 0 3px rgba(232,51,74,0.3); }
    }
    .send-btn.stop { background: var(--surface3) !important; opacity: 1 !important; cursor: pointer !important; }
    .send-btn.stop:hover { background: #3a3a40 !important; }

    .input-hint { margin-top: 9px; text-align: center; font-size: 11px; color: var(--text3); transition: color 0.2s; }
    .input-hint.waiting { color: var(--accent); }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo-mark">M</div>
  </div>

  <!-- Messages / welcome -->
  <div class="messages-wrap" id="messagesWrap">

    <!-- Welcome screen -->
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">M</div>
      <div class="empty-title">How can I help you today?</div>
      <div class="empty-sub">Ask me anything about your LinkedIn network, contacts, or connections.</div>
      <div class="suggestions">
        <button class="suggestion" onclick="fillSuggestion('Find my connections in Serbia')">Find my connections in Serbia</button>
        <button class="suggestion" onclick="fillSuggestion('Who works at Google in my network?')">Who works at Google in my network?</button>
        <button class="suggestion" onclick="fillSuggestion('Show connections from Belgrade')">Show connections from Belgrade</button>
        <button class="suggestion" onclick="fillSuggestion('List my most recent connections')">List my most recent connections</button>
      </div>
    </div>

    <!-- Chat messages -->
    <div class="messages" id="messages"></div>

  </div>

  <!-- Input -->
  <div class="input-shell">
    <div class="input-box">
      <textarea id="userInput" placeholder="Message MAP…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <!-- Arrow up (default) -->
        <svg id="iconSend" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
        <!-- Stop square (while waiting) -->
        <svg id="iconStop" width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="inputHint">Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
  const messagesEl   = document.getElementById('messages');
  const messagesWrap = document.getElementById('messagesWrap');
  const inputEl      = document.getElementById('userInput');
  const sendBtn      = document.getElementById('sendBtn');
  const emptyState   = document.getElementById('emptyState');
  const inputBox     = document.querySelector('.input-box');
  const inputHint    = document.getElementById('inputHint');
  const iconSend     = document.getElementById('iconSend');
  const iconStop     = document.getElementById('iconStop');

  let isWaiting = false;
  let activeReader = null; // so we can cancel mid-stream

  function setWaiting(on) {
    isWaiting = on;
    inputBox.classList.toggle('waiting', on);
    inputHint.classList.toggle('waiting', on);
    inputEl.placeholder = on ? 'Generating…' : 'Message MAP…';
    sendBtn.disabled = false; // always enabled while waiting (acts as stop)
    sendBtn.classList.toggle('stop', on);
    iconSend.style.display = on ? 'none' : '';
    iconStop.style.display = on ? '' : 'none';
  }

  function scrollToBottom() {
    messagesWrap.scrollTo({ top: messagesWrap.scrollHeight, behavior: 'smooth' });
  }

  function autoScroll() {
    const { scrollTop, scrollHeight, clientHeight } = messagesWrap;
    if (scrollHeight - scrollTop - clientHeight < 200) {
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
    }
  }

  function fillSuggestion(text) {
    inputEl.value = text;
    autoResize();
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function showMessages() {
    emptyState.style.display = 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addUserRow(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar user">P</div>
      <div class="msg-content">
        <div class="msg-name">You</div>
        <div class="msg-text">${escHtml(text)}</div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function addTypingRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar ai">M</div>
      <div class="msg-content">
        <div class="msg-name">MAP</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    messagesEl.appendChild(row);
    autoScroll();
  }

  function removeTyping() {
    document.getElementById('typing-row')?.remove();
  }

  function addAiRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="msg-avatar ai">M</div>
      <div class="msg-content">
        <div class="msg-name">MAP</div>
        <div class="msg-text" id="stream-target"></div>
      </div>`;
    messagesEl.appendChild(row);
    return row;
  }

  function addProfilesExpander(profiles, contentEl) {
      if (!profiles?.length) return;

      const expander = document.createElement('div');
      expander.className = 'profiles-expander';

      const header = document.createElement('div');
      header.className = 'expander-header';
      header.innerHTML = `
        <div class="expander-title">View ${profiles.length} profile${profiles.length > 1 ? 's' : ''}</div>
        <svg class="expander-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      `;

      const content = document.createElement('div');
      content.className = 'expander-content';

      profiles.forEach(p => {
        const card = document.createElement('div');
        card.className = 'profile-card';
        card.innerHTML = `
          <div class="profile-header">
            <div class="profile-name">${escHtml(p.name)}</div>
            ${p.relevance_score ? `<div class="profile-score">${(p.relevance_score * 100).toFixed(0)}%</div>` : ''}
          </div>
          ${p.headline ? `<div class="profile-headline">${escHtml(p.headline)}</div>` : ''}
          ${p.relevance_summary ? `<div class="profile-summary">${escHtml(p.relevance_summary)}</div>` : ''}
          <a href="${p.linkedin_url}" target="_blank" class="profile-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            View LinkedIn Profile
          </a>
        `;
        content.appendChild(card);
      });

      header.addEventListener('click', () => {
        const arrow = header.querySelector('.expander-arrow');
        const isOpen = content.classList.toggle('open');
        arrow.classList.toggle('open', isOpen);
      });

      expander.appendChild(header);
      expander.appendChild(content);
      contentEl.appendChild(expander);
  }

  async function send() {
    // If waiting, clicking send = stop (just re-enable UI, can't cancel non-streaming)
    if (isWaiting) {
      setWaiting(false);
      sendBtn.disabled = inputEl.value.trim() === '';
      return;
    }

    const msg = inputEl.value.trim();
    if (!msg) return;

    inputEl.value = '';
    autoResize();
    setWaiting(true);
    showMessages();
    addUserRow(msg);
    addTypingRow();

    try {
      const res = await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });

      if (!res.ok) throw new Error('Server error ' + res.status);

      const data = await res.json();
      removeTyping();

      const aiRow     = addAiRow();
      const textEl    = aiRow.querySelector('#stream-target');
      const contentEl = aiRow.querySelector('.msg-content');
      textEl.removeAttribute('id');
      textEl.classList.add('md');
      textEl.innerHTML = marked.parse(data.systemRes || '');

      if (data.profiles) addProfilesExpander(data.profiles, contentEl);

    } catch (e) {
      removeTyping();
      const aiRow = addAiRow();
      aiRow.querySelector('#stream-target').textContent = 'Something went wrong. Please try again.';
    }

    activeReader = null;
    setWaiting(false);
    sendBtn.disabled = inputEl.value.trim() === '';
    inputEl.focus();
    scrollToBottom();
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  }

  inputEl.addEventListener('input', () => {
    autoResize();
    if (!isWaiting) sendBtn.disabled = inputEl.value.trim() === '';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
