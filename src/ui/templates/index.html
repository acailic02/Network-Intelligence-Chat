<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --surface:     #18181b;
      --surface2:    #222226;
      --surface3:    #2a2a2f;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.1);
      --text:        #f0f0f2;
      --text2:       #a0a0aa;
      --text3:       #606068;
      --accent:      #e8334a;
      --accent2:     #3a6ff7;
      --accent-glow: rgba(232,51,74,0.15);
      --accent-soft: rgba(232,51,74,0.08);
      --green:       #4ade80;
      --font:        'Sora', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Graph canvas overlay ── */
    #graphCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 0;
    }
    #graphCanvas.visible { opacity: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: #1a0608;
      border: 1px solid rgba(232,51,74,0.35);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 11px; font-weight: 500;
      color: #e8334a;
      position: relative;
      overflow: hidden;
    }
    .logo-mark::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 40%;
      background: rgba(232,51,74,0.07);
    }

    .model-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 5px var(--green);
    }

    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
      position: relative;
      z-index: 2;
    }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      padding: 40px 24px;
      text-align: center;
    }

    .empty-logo {
      width: 52px; height: 52px;
      background: var(--accent-soft);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 17px; font-weight: 500;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 22px; font-weight: 600;
      color: var(--text); letter-spacing: -0.4px;
    }

    .empty-sub {
      font-size: 14px; color: var(--text2);
      line-height: 1.65; max-width: 340px;
    }

    .suggestions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%; max-width: 460px;
      margin-top: 6px;
    }

    .suggestion {
      padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--surface);
      font-size: 12.5px; color: var(--text2);
      cursor: pointer; transition: all 0.15s;
      text-align: left; line-height: 1.45;
      font-family: var(--font);
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }

    .messages {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 16px;
      display: flex;
      flex-direction: column;
    }

    .msg-row {
      display: flex;
      gap: 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.18s ease both;
    }
    .msg-row:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-avatar.ai   {
      background: #1a0608;
      border: 1px solid rgba(232,51,74,0.3);
      color: #e8334a;
      font-family: var(--mono);
      position: relative; overflow: hidden;
    }
    .msg-avatar.ai::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: rgba(232,51,74,0.07);
    }
    .msg-avatar.user { background: var(--surface3); color: var(--text2); font-family: var(--font); font-size: 12px; }

    .msg-content { flex: 1; min-width: 0; }
    .msg-name { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .msg-text { font-size: 14.5px; line-height: 1.75; color: var(--text); white-space: pre-wrap; word-break: break-word; }

    .msg-text.md { white-space: normal; }
    .msg-text.md p { margin-bottom: 10px; }
    .msg-text.md p:last-child { margin-bottom: 0; }
    .msg-text.md strong { font-weight: 600; color: var(--text); }
    .msg-text.md em { font-style: italic; }
    .msg-text.md h1, .msg-text.md h2, .msg-text.md h3 {
      font-weight: 600; color: var(--text);
      margin: 14px 0 6px; line-height: 1.3;
    }
    .msg-text.md h1 { font-size: 18px; }
    .msg-text.md h2 { font-size: 16px; }
    .msg-text.md h3 { font-size: 15px; }
    .msg-text.md ul, .msg-text.md ol { padding-left: 20px; margin-bottom: 10px; }
    .msg-text.md li { margin-bottom: 4px; }
    .msg-text.md code {
      font-family: var(--mono); font-size: 13px;
      background: var(--surface3); color: #e0c0ff;
      padding: 2px 6px; border-radius: 4px;
    }
    .msg-text.md pre {
      background: var(--surface3); border-radius: 8px;
      padding: 12px 14px; margin: 10px 0; overflow-x: auto;
    }
    .msg-text.md pre code { background: none; padding: 0; color: var(--text2); }
    .msg-text.md a { color: var(--accent); text-decoration: none; }
    .msg-text.md a:hover { text-decoration: underline; }
    .msg-text.md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px; color: var(--text2); margin: 8px 0;
    }
    .msg-text.md hr { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }

    .cursor {
      display: inline-block; width: 2px; height: 15px;
      background: var(--accent); border-radius: 1px;
      margin-left: 1px; vertical-align: middle;
      animation: blink 0.55s steps(1) infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .profiles-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .profile-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 999px;
      border: 1px solid var(--border2); background: var(--surface2);
      font-size: 12px; color: var(--text2);
      animation: fadeUp 0.2s ease both;
    }
    .profile-pill::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent); flex-shrink: 0;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .profiles-expander {
      margin-top: 16px;
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .expander-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .expander-header:hover { background: var(--surface2); }

    .expander-title { font-size: 13px; font-weight: 500; color: var(--text2); }

    .expander-arrow {
      width: 16px; height: 16px;
      transition: transform 0.2s;
      color: var(--text3);
    }
    .expander-arrow.open { transform: rotate(180deg); }

    .expander-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .expander-content.open { max-height: 600px; overflow-y: auto; }

    .profile-card { padding: 14px 16px; border-top: 1px solid var(--border); }
    .profile-card:first-child { border-top: none; }

    .profile-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }

    .profile-name { font-size: 14px; font-weight: 600; color: var(--text); }

    .profile-score {
      font-size: 11px; font-family: var(--mono);
      color: var(--accent); background: var(--accent-soft);
      padding: 3px 8px; border-radius: 6px;
    }

    .profile-headline { font-size: 12.5px; color: var(--text2); margin-bottom: 6px; }
    .profile-summary { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 8px; }

    .profile-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--accent2);
      text-decoration: none; transition: color 0.15s;
    }
    .profile-link:hover { color: var(--accent); }

    .thinking-text {
      font-size: 13px;
      color: var(--text3);
      font-family: var(--mono);
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
    }
    .thinking-text .t-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); opacity: 0.5;
      flex-shrink: 0;
      animation: td 1.1s infinite ease-in-out;
    }
    .thinking-text .t-phrase {
      animation: phraseIn 0.3s ease both;
    }
    @keyframes phraseIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
    @keyframes td { 0%,60%,100%{transform:scale(1);opacity:0.35} 30%{transform:scale(1.4);opacity:1} }

    .input-shell {
      padding: 12px 24px 20px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 2;
    }

    .input-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      display: block; width: 100%;
      background: transparent; border: none; outline: none; resize: none;
      padding: 15px 52px 15px 18px;
      font-family: var(--font); font-size: 14px;
      color: var(--text); line-height: 1.6;
      min-height: 52px; max-height: 200px;
      overflow-y: auto; scrollbar-width: none;
    }
    textarea::placeholder { color: var(--text3); }
    textarea::-webkit-scrollbar { display: none; }

    .send-btn {
      position: absolute; right: 9px; bottom: 9px;
      width: 34px; height: 34px; border-radius: 9px;
      border: 1px solid rgba(232,51,74,0.5);
      background: #1a0608;
      color: #e8334a;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s, opacity 0.15s, border-color 0.15s;
      position: absolute; right: 9px; bottom: 9px;
      overflow: hidden;
    }
    .send-btn::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: rgba(232,51,74,0.08);
    }
    .send-btn svg { position: relative; z-index: 1; }
    .send-btn:hover:not(:disabled) { background: #270a0e; border-color: rgba(232,51,74,0.8); }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.25; cursor: default; }

    .input-box.waiting {
      border-radius: 14px;
      animation: pulse-border 1.8s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 2px rgba(232,51,74,0.08); }
      50%       { box-shadow: 0 0 0 3px rgba(232,51,74,0.3); }
    }
    .send-btn.stop { background: var(--surface3) !important; opacity: 1 !important; cursor: pointer !important; }
    .send-btn.stop:hover { background: #3a3a40 !important; }

    .input-hint { margin-top: 9px; text-align: center; font-size: 11px; color: var(--text3); transition: color 0.2s; }
    .input-hint.waiting { color: var(--accent); }
  </style>
</head>
<body>

<!-- Graph canvas — behind everything -->
<canvas id="graphCanvas"></canvas>

<div class="app">

  <div class="topbar">
    <div class="logo-mark">M</div>
  </div>

  <div class="messages-wrap" id="messagesWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">M</div>
      <div class="empty-title">How can I help you today?</div>
      <div class="empty-sub">Ask me anything about your LinkedIn network, contacts, or connections.</div>
      <div class="suggestions">
        <button class="suggestion" onclick="fillSuggestion('Find my connections in Serbia')">Find my connections in Serbia</button>
        <button class="suggestion" onclick="fillSuggestion('Who works at Google in my network?')">Who works at Google in my network?</button>
        <button class="suggestion" onclick="fillSuggestion('Show connections from Belgrade')">Show connections from Belgrade</button>
        <button class="suggestion" onclick="fillSuggestion('List my most recent connections')">List my most recent connections</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>
  </div>

  <div class="input-shell">
    <div class="input-box">
      <textarea id="userInput" placeholder="Message MAP…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg id="iconSend" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
        <svg id="iconStop" width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="inputHint">Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
  /* ── Graph animation ── */
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  let animFrame = null;
  let graphActive = false;
  let nodes = [];
  let edges = [];

  const ACCENT = '#e8334a';
  const NODE_COUNT = 32;
  const SIDE_WIDTH = 0.30; // wider corridor = more scattered

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); if (graphActive) rebuildGraph(); });

  function sideMaxX(side) {
    // Hard boundary: left nodes stay left of 30%, right nodes stay right of 70%
    return side === 'left' ? canvas.width * SIDE_WIDTH : canvas.width * (1 - SIDE_WIDTH);
  }

  function randSide() {
    const w = canvas.width;
    const h = canvas.height;
    const side = Math.random() < 0.5 ? 'left' : 'right';
    let x;
    if (side === 'left') {
      // Spread across the full left corridor, biased a bit inward
      x = Math.random() * w * SIDE_WIDTH;
    } else {
      x = w - Math.random() * w * SIDE_WIDTH;
    }
    // Distribute vertically across full height
    const y = Math.random() * h;
    return { x, y, side };
  }

  function buildNodes() {
    nodes = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      const pos = randSide();
      const r = 2.5 + Math.random() * 3.5;
      nodes.push({
        x: pos.x,
        y: pos.y,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r,
        alpha: 0,
        targetAlpha: 0.35 + Math.random() * 0.45,
        fadeIn: Math.random() * 0.012 + 0.004,
        side: pos.side,
        born: Date.now() + Math.random() * 1800, // staggered birth
        dead: false,
        dying: false,
        dieAt: Date.now() + 3000 + Math.random() * 5000,
      });
    }
  }

  function buildEdges() {
    edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        if (nodes[i].side !== nodes[j].side) continue; // strict same-side only
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        // Larger threshold so scattered nodes still connect, but lower probability
        const threshold = canvas.width * 0.18;
        if (dist < threshold && Math.random() < 0.35) {
          edges.push({ a: i, b: j, alpha: 0, targetAlpha: 0.06 + Math.random() * 0.10 });
        }
      }
    }
  }

  function rebuildGraph() {
    buildNodes();
    buildEdges();
  }

  function drawGraph(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const now = Date.now();

    // Revive dead nodes
    nodes.forEach((n, idx) => {
      if (n.dead) {
        // Respawn
        const pos = randSide();
        n.x = pos.x; n.y = pos.y; n.side = pos.side;
        n.vx = (Math.random() - 0.5) * 0.18;
        n.vy = (Math.random() - 0.5) * 0.18;
        n.r = 2.5 + Math.random() * 3.5;
        n.alpha = 0;
        n.targetAlpha = 0.35 + Math.random() * 0.45;
        n.fadeIn = Math.random() * 0.012 + 0.004;
        n.born = now + Math.random() * 1000;
        n.dead = false;
        n.dying = false;
        n.dieAt = now + 3500 + Math.random() * 5000;
        // Rebuild edges when nodes respawn
        buildEdges();
      }
    });

    // Update nodes
    nodes.forEach(n => {
      if (now < n.born) return;

      // Fade lifecycle
      if (!n.dying && now > n.dieAt) n.dying = true;

      if (!n.dying) {
        n.alpha += (n.targetAlpha - n.alpha) * n.fadeIn;
      } else {
        n.alpha -= 0.006;
        if (n.alpha <= 0) { n.alpha = 0; n.dead = true; return; }
      }

      // Move
      n.x += n.vx;
      n.y += n.vy;

      // Drift back toward own side center
      const w = canvas.width;
      const sideCenterX = n.side === 'left' ? w * 0.15 : w * 0.85;
      n.vx += (sideCenterX - n.x) * 0.00022;
      n.vy += (canvas.height / 2 - n.y) * 0.00005;
      // Dampen
      n.vx *= 0.994;
      n.vy *= 0.994;
      // Hard clamp — never cross into chat area
      const boundary = sideMaxX(n.side);
      if (n.side === 'left'  && n.x > boundary) { n.x = boundary; n.vx *= -0.4; }
      if (n.side === 'right' && n.x < boundary) { n.x = boundary; n.vx *= -0.4; }
    });

    // Draw edges
    edges.forEach(e => {
      const a = nodes[e.a], b = nodes[e.b];
      if (a.dead || b.dead || a.alpha < 0.01 || b.alpha < 0.01) return;
      const alpha = Math.min(a.alpha, b.alpha) * 0.55;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(232,51,74,${alpha})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    });

    // Draw nodes
    nodes.forEach(n => {
      if (n.alpha < 0.005 || now < n.born) return;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,51,74,${n.alpha})`;
      ctx.fill();
      // Tiny ring for bigger nodes
      if (n.r > 4) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + 2.5, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(232,51,74,${n.alpha * 0.25})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    });

    if (graphActive) animFrame = requestAnimationFrame(drawGraph);
  }

  function startGraph() {
    if (graphActive) return;
    graphActive = true;
    rebuildGraph();
    canvas.classList.add('visible');
    animFrame = requestAnimationFrame(drawGraph);
  }

  function stopGraph() {
    graphActive = false;
    // Keep canvas visible — fade-out loop will clear it when done
    // Mark all nodes as dying — they'll fade out on their own in the last animation pass
    nodes.forEach(n => { if (!n.dead) n.dying = true; });
    // Run one last fade loop until everything is gone, then stop
    function fadeOut() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let anyAlive = false;

      edges.forEach(e => {
        const a = nodes[e.a], b = nodes[e.b];
        if (a.alpha < 0.01 || b.alpha < 0.01) return;
        const alpha = Math.min(a.alpha, b.alpha) * 0.55;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(232,51,74,${alpha})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      });

      nodes.forEach(n => {
        n.alpha -= 0.008;
        if (n.alpha <= 0) { n.alpha = 0; return; }
        anyAlive = true;
        // Keep moving
        n.x += n.vx;
        n.y += n.vy;
        n.vx *= 0.997;
        n.vy *= 0.997;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,51,74,${n.alpha})`;
        ctx.fill();
        if (n.r > 4) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r + 2.5, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(232,51,74,${n.alpha * 0.25})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      });

      if (anyAlive) {
        animFrame = requestAnimationFrame(fadeOut);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.classList.remove('visible');
        if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
      }
    }
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(fadeOut);
  }

  /* ── Chat logic ── */
  const messagesEl   = document.getElementById('messages');
  const messagesWrap = document.getElementById('messagesWrap');
  const inputEl      = document.getElementById('userInput');
  const sendBtn      = document.getElementById('sendBtn');
  const emptyState   = document.getElementById('emptyState');
  const inputBox     = document.querySelector('.input-box');
  const inputHint    = document.getElementById('inputHint');
  const iconSend     = document.getElementById('iconSend');
  const iconStop     = document.getElementById('iconStop');

  let isWaiting = false;
  let activeReader = null;

  function setWaiting(on) {
    isWaiting = on;
    inputBox.classList.toggle('waiting', on);
    inputHint.classList.toggle('waiting', on);
    inputEl.placeholder = on ? 'Generating…' : 'Message MAP…';
    sendBtn.disabled = false;
    sendBtn.classList.toggle('stop', on);
    iconSend.style.display = on ? 'none' : '';
    iconStop.style.display = on ? '' : 'none';
    if (on) startGraph(); else stopGraph();
  }

  function scrollToBottom() {
    messagesWrap.scrollTo({ top: messagesWrap.scrollHeight, behavior: 'smooth' });
  }

  function autoScroll() {
    const { scrollTop, scrollHeight, clientHeight } = messagesWrap;
    if (scrollHeight - scrollTop - clientHeight < 200) {
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
    }
  }

  function fillSuggestion(text) {
    inputEl.value = text;
    autoResize();
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function showMessages() {
    emptyState.style.display = 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addUserRow(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar user">P</div>
      <div class="msg-content">
        <div class="msg-name">You</div>
        <div class="msg-text">${escHtml(text)}</div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  const THINKING_PHRASES = [
    'traversing the graph…',
    'mapping connections…',
    'following edges…',
    'scanning clusters…',
    'resolving nodes…',
    'tracing paths…',
    'linking vertices…',
    'indexing the network…',
    'crossing bridges…',
    'exploring branches…',
    'weighting edges…',
    'collapsing subgraphs…',
    'propagating signals…',
  ];
  let thinkingInterval = null;

  function addTypingRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar ai">M</div>
      <div class="msg-content">
        <div class="msg-name">MAP</div>
        <div class="thinking-text">
          <span class="t-dot"></span>
          <span class="t-phrase" id="thinking-phrase">${THINKING_PHRASES[0]}</span>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    autoScroll();

    let idx = 1;
    thinkingInterval = setInterval(() => {
      const el = document.getElementById('thinking-phrase');
      if (!el) { clearInterval(thinkingInterval); return; }
      el.style.animation = 'none';
      el.offsetHeight; // reflow to restart animation
      el.style.animation = '';
      el.textContent = THINKING_PHRASES[idx % THINKING_PHRASES.length];
      idx++;
    }, 4000);
  }

  function removeTyping() {
    clearInterval(thinkingInterval);
    thinkingInterval = null;
    document.getElementById('typing-row')?.remove();
  }

  function addAiRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="msg-avatar ai">M</div>
      <div class="msg-content">
        <div class="msg-name">MAP</div>
        <div class="msg-text" id="stream-target"></div>
      </div>`;
    messagesEl.appendChild(row);
    return row;
  }

  function addProfilesExpander(profiles, contentEl) {
    if (!profiles?.length) return;
    const expander = document.createElement('div');
    expander.className = 'profiles-expander';
    const header = document.createElement('div');
    header.className = 'expander-header';
    header.innerHTML = `
      <div class="expander-title">View ${profiles.length} profile${profiles.length > 1 ? 's' : ''}</div>
      <svg class="expander-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>`;
    const content = document.createElement('div');
    content.className = 'expander-content';
    profiles.forEach(p => {
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.innerHTML = `
        <div class="profile-header">
          <div class="profile-name">${escHtml(p.name)}</div>
          ${p.relevance_score ? `<div class="profile-score">${(p.relevance_score * 100).toFixed(0)}%</div>` : ''}
        </div>
        ${p.headline ? `<div class="profile-headline">${escHtml(p.headline)}</div>` : ''}
        ${p.relevance_summary ? `<div class="profile-summary">${escHtml(p.relevance_summary)}</div>` : ''}
        <a href="${p.linkedin_url}" target="_blank" class="profile-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          View LinkedIn Profile
        </a>`;
      content.appendChild(card);
    });
    header.addEventListener('click', () => {
      const arrow = header.querySelector('.expander-arrow');
      const isOpen = content.classList.toggle('open');
      arrow.classList.toggle('open', isOpen);
    });
    expander.appendChild(header);
    expander.appendChild(content);
    contentEl.appendChild(expander);
  }

  async function send() {
    if (isWaiting) {
      setWaiting(false);
      sendBtn.disabled = inputEl.value.trim() === '';
      return;
    }
    const msg = inputEl.value.trim();
    if (!msg) return;
    inputEl.value = '';
    autoResize();
    setWaiting(true);
    showMessages();
    addUserRow(msg);
    addTypingRow();
    try {
      const res = await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      removeTyping();
      const aiRow  = addAiRow();
      const textEl = aiRow.querySelector('#stream-target');
      const contentEl = aiRow.querySelector('.msg-content');
      textEl.removeAttribute('id');
      textEl.classList.add('md');
      textEl.innerHTML = marked.parse(data.systemRes || '');
      if (data.profiles) addProfilesExpander(data.profiles, contentEl);
    } catch (e) {
      removeTyping();
      const aiRow = addAiRow();
      aiRow.querySelector('#stream-target').textContent = 'Something went wrong. Please try again.';
    }
    activeReader = null;
    setWaiting(false);
    sendBtn.disabled = inputEl.value.trim() === '';
    inputEl.focus();
    scrollToBottom();
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  }

  inputEl.addEventListener('input', () => {
    autoResize();
    if (!isWaiting) sendBtn.disabled = inputEl.value.trim() === '';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
